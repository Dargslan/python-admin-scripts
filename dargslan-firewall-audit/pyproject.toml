[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dargslan-firewall-audit"
version = "1.0.0"
description = "Linux firewall audit tool — check iptables/nftables rules, detect open ports, and generate security reports"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.7"
authors = [{name = "Dargslan", email = "info@dargslan.com"}]
keywords = ["firewall", "iptables", "nftables", "security", "audit", "linux", "hardening"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Topic :: Security",
]

[project.urls]
Homepage = "https://dargslan.com"
Documentation = "https://dargslan.com/blog"
Repository = "https://github.com/Dargslan/dargslan-firewall-audit"
"Free Cheat Sheets" = "https://dargslan.com/cheat-sheets"
"Security Books" = "https://dargslan.com/books?category=security"

[project.scripts]
dargslan-fwaudit = "dargslan_firewall_audit.cli:main"
