[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dargslan-net-scanner"
version = "1.0.0"
description = "Lightweight network scanner — ping sweep, port scan, and service detection for Linux sysadmins"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.7"
authors = [{name = "Dargslan", email = "info@dargslan.com"}]
keywords = ["network", "scanner", "port-scan", "ping-sweep", "security", "sysadmin", "devops", "linux"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Topic :: System :: Networking",
]

[project.urls]
Homepage = "https://dargslan.com"
Documentation = "https://dargslan.com/blog"
Repository = "https://github.com/Dargslan/dargslan-net-scanner"
"Free Cheat Sheets" = "https://dargslan.com/cheat-sheets"
"Linux Books" = "https://dargslan.com/books"

[project.scripts]
dargslan-netscan = "dargslan_net_scanner.cli:main"
