[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "dargslan-ntp-check"
version = "1.0.0"
description = "NTP time synchronization checker for Linux. Verifies NTP daemon status, clock offset, stratum, and time sync configuration."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.7"
authors = [{name = "Dargslan", email = "info@dargslan.com"}]
keywords = ["ntp", "time", "chrony", "timesyncd", "linux", "dargslan"]
classifiers = ["Programming Language :: Python :: 3", "License :: OSI Approved :: MIT License", "Operating System :: POSIX :: Linux", "Topic :: System :: Systems Administration"]

[project.scripts]
dargslan-ntpchk = "dargslan_ntp_check.cli:main"

[project.urls]
Homepage = "https://dargslan.com"
Documentation = "https://dargslan.com/blog"
