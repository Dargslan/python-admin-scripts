[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "dargslan-grub-check"
version = "1.0.1"
description = "GRUB bootloader configuration checker for Linux. Validates grub.cfg, kernel parameters, boot entries, and timeout settings."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.7"
authors = [{name = "Dargslan", email = "info@dargslan.com"}]
keywords = ["grub", "bootloader", "boot", "kernel", "linux", "dargslan"]
classifiers = ["Programming Language :: Python :: 3", "License :: OSI Approved :: MIT License", "Operating System :: POSIX :: Linux", "Topic :: System :: Systems Administration"]

[project.scripts]
dargslan-grub = "dargslan_grub_check.cli:main"

[project.urls]
Homepage = "https://dargslan.com"
Documentation = "https://dargslan.com/blog"
