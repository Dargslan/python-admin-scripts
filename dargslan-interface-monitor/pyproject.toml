[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "dargslan-interface-monitor"
version = "1.0.0"
description = "Network interface monitor -- link status, speed, errors, IP addresses, and traffic statistics."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.7"
authors = [{name = "Dargslan", email = "info@dargslan.com"}]
keywords = ["linux", "network,interface,ethernet,monitoring,sysadmin"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Topic :: System :: Systems Administration",
]

[project.scripts]
dargslan-iface = "dargslan_interface_monitor.cli:main"

[project.urls]
Homepage = "https://dargslan.com"
Documentation = "https://dargslan.com/blog"
