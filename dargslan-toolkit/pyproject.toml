[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dargslan-toolkit"
version = "1.20.0"
description = "Complete Linux sysadmin toolkit — 118 CLI tools for monitoring, security, networking, storage, and DevOps. One install, all tools."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.7"
authors = [{name = "Dargslan", email = "info@dargslan.com"}]
keywords = ["linux", "sysadmin", "devops", "toolkit", "monitoring", "security", "docker", "network", "firewall", "log-parser"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3",
    "Topic :: System :: Systems Administration",
    "Topic :: System :: Monitoring",
    "Topic :: System :: Networking",
    "Topic :: Security",
]
dependencies = [
    "dargslan-sysinfo>=1.0.0",
    "dargslan-log-parser>=1.0.0",
    "dargslan-net-scanner>=1.0.0",
    "dargslan-firewall-audit>=1.0.0",
    "dargslan-docker-health>=1.0.0",
    "dargslan-ssl-checker>=1.0.0",
    "dargslan-disk-cleaner>=1.0.0",
    "dargslan-process-monitor>=1.0.0",
    "dargslan-cron-audit>=1.0.0",
    "dargslan-backup-monitor>=1.0.0",
    "dargslan-user-audit>=1.0.0",
    "dargslan-service-monitor>=1.0.0",
    "dargslan-port-monitor>=1.0.0",
    "dargslan-log-rotate>=1.0.0",
    "dargslan-security-scan>=1.0.0",
    "dargslan-dns-check>=1.0.0",
    "dargslan-container-audit>=1.0.0",
    "dargslan-nginx-analyzer>=1.0.0",
    "dargslan-mysql-health>=1.0.0",
    "dargslan-systemd-timer>=1.0.0",
    "dargslan-ssh-audit>=1.0.0",
    "dargslan-ip-geo>=1.0.0",
    "dargslan-bandwidth-monitor>=1.0.0",
    "dargslan-package-audit>=1.0.0",
